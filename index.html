<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathcoin Decoder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <body>
<div class="scanlines"></div>

<div class="container">
  <header>
    <div class="tag-line">Pathcoin</div>
    <h1>decode<span> pathcoinstate.transfer</span></h1>
  </header>

  <div class="input-section">
    <textarea id="b64input" rows="4" spellcheck="false"
      placeholder=""></textarea>
    <div class="controls">
      <button class="btn-primary" onclick="decode()">Decode</button>
      <button class="btn-secondary" onclick="clearAll()">Clear</button>
      <span class="status-bar" id="status"></span>
    </div>
  </div>

  <div class="output-section" id="output">
    <div class="output-header">
      <div class="output-title">
        Decoded
      </div>
      <button class="btn-copy" onclick="copyJSON()">Copy</button>
    </div>
    <div class="json-view" id="json-view"></div>
    <div class="stats-row" id="stats-row"></div>
  </div>

<script>

function base64ToBytes(b64) {
  const bin = atob(b64.trim().replace(/\s+/g, ''));
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function toHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

function readVarInt(buf, offset) {
  const first = buf[offset];
  if (first < 0xfd) return { value: first, size: 1 };
  if (first === 0xfd) return { value: buf[offset+1] | (buf[offset+2] << 8), size: 3 };
  if (first === 0xfe) return {
    value: (buf[offset+1] | (buf[offset+2]<<8) | (buf[offset+3]<<16) | (buf[offset+4]*0x1000000)),
    size: 5
  };
  throw new Error('64-bit varint not supported');
}

function readBytesSerializer(buf, offset) {
  const len = readVarInt(buf, offset);
  offset += len.size;
  const bytes = buf.slice(offset, offset + len.value);
  return { bytes, newOffset: offset + len.value };
}

function readInt32LE(buf, offset) {
  return buf[offset] | (buf[offset+1]<<8) | (buf[offset+2]<<16) | (buf[offset+3]<<24);
}

function parseTransferAggregate(buf) {
  let offset = 0;

  if (buf.length < 4) throw new Error('Buffer too short for n');
  const n = readInt32LE(buf, offset);
  offset += 4;

  if (n <= 0 || n > 100) throw new Error(`Suspicious n value: ${n}`);

  const countVI = readVarInt(buf, offset);
  offset += countVI.size;
  const count = countVI.value;

  const transfers = [];

  for (let t = 0; t < count; t++) {
    const idx = readInt32LE(buf, offset);
    offset += 4;

    const numSigs = n - 1 - idx;
    if (numSigs < 0) throw new Error(`Invalid idx ${idx} for n=${n}: would give negative sig count`);

    const partialSigs = [];
    for (let s = 0; s < numSigs; s++) {
      const r = readBytesSerializer(buf, offset);
      partialSigs.push(toHex(r.bytes));
      offset = r.newOffset;
    }

    const adaptorR = readBytesSerializer(buf, offset);
    const adaptor = toHex(adaptorR.bytes);
    offset = adaptorR.newOffset;

    const fbR = readBytesSerializer(buf, offset);
    const fbPreimage = toHex(fbR.bytes);
    offset = fbR.newOffset;

    transfers.push({ index: idx, adaptor_partial_sig: adaptor, partial_signatures: partialSigs, fb_preimage: fbPreimage });
  }

  if (offset !== buf.length) {
    console.warn(`${buf.length - offset} bytes remaining after parse`);
  }

  return { n, transfers };
}


let lastParsed = null;

function decode() {
  const raw = document.getElementById('b64input').value.trim();
  const status = document.getElementById('status');
  const output = document.getElementById('output');

  if (!raw) {
    setStatus('error', '⚠ Paste a base64 string first');
    return;
  }

  try {
    const buf = base64ToBytes(raw);
    const result = parseTransferAggregate(buf);
    lastParsed = result;

    document.getElementById('json-view').innerHTML = renderJSON(result);
    renderStats(result, buf.length);

    output.classList.add('visible');

  } catch (e) {
    setStatus('error', '' + e.message);
    output.classList.remove('visible');
  }
}

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar ' + type;
}

function clearAll() {
  document.getElementById('b64input').value = '';
  document.getElementById('output').classList.remove('visible');
  document.getElementById('status').textContent = '';
  document.getElementById('status').className = 'status-bar';
  lastParsed = null;
}

function copyJSON() {
  if (!lastParsed) return;
  navigator.clipboard.writeText(JSON.stringify(lastParsed, null, 2))
    .then(() => setStatus('success', 'Copied to clipboard'))
    .catch(() => setStatus('error', 'Clipboard access denied'));
}

function renderStats(result, byteLen) {
  const row = document.getElementById('stats-row');
  const totalSigs = result.transfers.reduce((a, t) => a + t.partial_signatures.length, 0);
  row.innerHTML = `
    <div class="stat-cell">
      <div class="stat-label">Participants (n)</div>
      <div class="stat-value">${result.n}</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Transfers</div>
      <div class="stat-value">${result.transfers.length}</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Partial Sigs</div>
      <div class="stat-value">${totalSigs}</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Raw Bytes</div>
      <div class="stat-value">${byteLen}</div>
    </div>
  `;
}


function renderJSON(obj, depth = 0) {
  if (obj === null) return `<span class="jv-null">null</span>`;
  if (typeof obj === 'boolean') return `<span class="jv-bool">${obj}</span>`;
  if (typeof obj === 'number') return `<span class="jv-number">${obj}</span>`;
  if (typeof obj === 'string') {
    if (/^[0-9a-f]{10,}$/i.test(obj)) {
      const shortened = obj.length > 80 ? obj.slice(0,40) + '…' + obj.slice(-8) : obj;
      return `<span class="hex-block" title="${obj}">${shortened}</span>`;
    }
    return `<span class="jv-string">"${escapeHTML(obj)}"</span>`;
  }

  if (Array.isArray(obj)) {
    if (obj.length === 0) return `<span class="jv-punct">[]</span>`;
    const id = 'jv' + Math.random().toString(36).slice(2);
    const items = obj.map((v, i) => {
      const comma = i < obj.length - 1 ? '<span class="jv-punct">,</span>' : '';
      return `<div>${renderJSON(v, depth+1)}${comma}</div>`;
    }).join('');
    return `
        <div class="jv-arr jv-body" id="${id}">${items}</div>
        <span class="jv-punct">]</span>
      </span>`;
  }

  if (typeof obj === 'object') {
    const keys = Object.keys(obj);
    if (keys.length === 0) return `<span class="jv-punct">{}</span>`;
    const id = 'jv' + Math.random().toString(36).slice(2);
    const items = keys.map((k, i) => {
      const comma = i < keys.length - 1 ? '<span class="jv-punct">,</span>' : '';
      return `<div><span class="jv-key">"${escapeHTML(k)}"</span><span class="jv-punct">: </span>${renderJSON(obj[k], depth+1)}${comma}</div>`;
    }).join('');
    return `
      <span class="jv-collapsible">
        <span class="jv-toggle" onclick="toggleCollapse('${id}')"></span><span class="jv-punct">{</span>
        <div class="jv-obj jv-body" id="${id}">${items}</div>
        <span class="jv-punct">}</span>
      </span>`;
  }

  return `<span>${escapeHTML(String(obj))}</span>`;
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('b64input').addEventListener('paste', () => {
  setTimeout(decode, 50);
});
document.getElementById('b64input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); decode(); }
});
</script>
</body>
    
  </body>
  
</html>
